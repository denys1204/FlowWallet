databaseChangeLog:
  - changeSet:
      id: 002-create-outbox-events-seq
      author: flow-wallet
      changes:
        - createSequence:
            sequenceName: outbox_events_seq
            incrementBy: 50
            startValue: 1
  - changeSet:
      id: 002-create-outbox-events-table
      author: flow-wallet
      changes:
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: aggregate_type
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: 'PENDING'
                  constraints:
                    nullable: false
              - column:
                  name: retry_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: processed_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
        - createIndex:
            tableName: outbox_events
            indexName: idx_outbox_events_status
            columns:
              - column:
                  name: status
