databaseChangeLog:
  - changeSet:
      id: 001-create-payment-transactions-seq
      author: flow-wallet
      changes:
        - createSequence:
            sequenceName: payment_transactions_seq
            incrementBy: 50
            startValue: 1
  - changeSet:
      id: 001-create-payment-transactions-table
      author: flow-wallet
      changes:
        - createTable:
            tableName: payment_transactions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: transaction_reference
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: provider_name
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: provider_transaction_id
                  type: VARCHAR(128)
                  constraints:
                    nullable: true
                    unique: true
              - column:
                  name: wallet_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: NUMERIC(19,4)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(3)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: 'PENDING'
                  constraints:
                    nullable: false
              - column:
                  name: provider_event_id
                  type: VARCHAR(128)
                  constraints:
                    nullable: true
                    unique: true
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: payment_transactions
            indexName: idx_payment_transactions_provider_tx_id
            columns:
              - column:
                  name: provider_transaction_id
  - changeSet:
      id: 002-add-provider-metadata-to-payment-transactions
      author: flow-wallet
      changes:
        - addColumn:
            tableName: payment_transactions
            columns:
              - column:
                  name: provider_metadata
                  type: JSONB
