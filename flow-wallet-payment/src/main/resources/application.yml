server:
  port: ${PAYMENT_SERVICE_PORT:8082}

spring:
  application:
    name: flow-wallet-payment
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/payment_db
    username: ${DB_USER:flowadmin}
    password: ${DB_PASSWORD:flowsecret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
    topic:
      payment-events:
        partitions: ${KAFKA_TOPIC_PAYMENT_EVENTS_PARTITIONS:3}
        replicas: ${KAFKA_TOPIC_PAYMENT_EVENTS_REPLICAS:1}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}

stripe:
  api:
    key: ${STRIPE_API_KEY:sk_test_dummy}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:whsec_dummy}

outbox:
  poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:10000}
  batch-size: ${OUTBOX_BATCH_SIZE:50}
  max-retries: ${OUTBOX_MAX_RETRIES:3}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.flowwallet: ${APP_LOG_LEVEL:DEBUG}
    # Reduce noise from Kafka when it's down
    org.apache.kafka.clients.NetworkClient: ERROR
    org.apache.kafka.clients.Metadata: ERROR
    org.apache.kafka.clients.producer.internals.Sender: ERROR
