server:
  port: ${PAYMENT_SERVICE_PORT:8082}

spring:
  application:
    name: flow-wallet-payment
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/payment_db
    username: ${DB_USER:flowadmin}
    password: ${DB_PASSWORD:flowsecret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
    topic:
      payment-events:
        partitions: ${KAFKA_TOPIC_PAYMENT_EVENTS_PARTITIONS:3}
        replicas: ${KAFKA_TOPIC_PAYMENT_EVENTS_REPLICAS:1}

stripe:
  api:
    key: ${STRIPE_API_KEY:sk_test_dummy}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:whsec_dummy}

outbox:
  poll-interval-ms: 5000
  batch-size: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info
